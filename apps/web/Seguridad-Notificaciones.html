<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SafePlace – Notificaciones</title>
  <link rel="stylesheet" href="Styles.css" />
</head>

<body>
    <div class="app">
        <!-- BARRA LATERAL -->
        <aside class="sidebar">
            <!-- Titulo y Logo -->
            <div class="sidebar__brand">
                <div class="sidebar__icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
                <div><div class="sidebar__name">SafePlace</div><div class="sidebar__sub">BIOMETRIC MONITOR</div></div>
            </div>
            
        <!-- Navegación -->
        <nav class="sidebar__nav">
            <a class="nav-item" href="Seguridad-Home.html"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg> Home </a>
            <a class="nav-item"  href="Seguridad-AlertasActivas.html"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> Alertas Activas</a>
            <a class="nav-item" href="Seguridad-Seguridad.html"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Historial Alertas</a>
            <a class="nav-item nav-item--active"href="Seguridad-Notificaciones.html"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg> Notificaciones</a>
        </nav>

            <!-- Usuario logueado + cerrar sesión -->
            <div class="sidebar__footer">
                <div class="sidebar__user">
                    <div class="avatar avatar--sm">MG</div>
                    <div>
                        <div class="sidebar__user-name">María González</div> <!--PONER EL NOMBRE DEL QUE ENTRO-->
                        <div class="sidebar__user-role">Resp. Seguridad e Higiene</div> <!--PONER EL ROL DEL QUE ENTRO-->
                    </div>
                </div>
            <a class="sidebar__logout" href='InicioSesion.html'><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Cerrar sesión </a>
            </div>
        </aside>

        <!-- BARRA SUPERIOR --> 
        <main class="main">
            <header class="topbar">
                <div class="topbar__title">Monitoreo en Tiempo Real</div>
                <div class="topbar__right">
                    <div class="notif-bell"> <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"> <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/> <path d="M13.73 21a2 2 0 0 1-3.46 0"/> </svg> <span class="notif-badge" id="notifBadge">4</span> </div>
                    <div class="avatar">MG</div> <!--PONER EL avatar-->
                </div>
            </header>

            <!-- Encabezado de sección -->
            <div class="mon-header">
                <div>
                    <h2 class="welcome__title">Notificaciones</h2> <p class="mon-header__status">
                </div>
                <button class="btn-actualizar" id="btnActualizar"> <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"> <polyline points="23 4 23 10 17 10"/> <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/> </svg> Actualizar</button>
            </div>

            <!-- PANTALLA -->
            <!-- Encabezado de sección -->
            <div class="notif-header">
                <div>
                    <h2 class="welcome__title">Notificaciones</h2>
                    <p class="notif-header__count" id="notifCount">4 sin leer</p> <!-- Cantidad de notificaciones por leer -->
                </div>
                <button class="notif-btn-leer" id="btnLeerTodas"> <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"> <polyline points="20 6 9 17 4 12"/></svg> Marcar todas como leídas </button>
            </div>
                
            <!-- Lista de notificaciones -->
            <div class="notif-list" id="notifList">
                <!-- Notificaciones inyectadas por Notificaciones.js -->
            </div>
        </main>
    </div>
    <script src="Supervisor-Notificaciones.js"></script>
</body>
</html>
