<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SafePlace – Historial</title><link rel="stylesheet" href="Styles.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>

<body> 
  <div class="app">
  <!-- BARRA LATERAL --> 
    <aside class="sidebar">
      <!-- Titulo y Logo -->
      <div class="sidebar__brand">
        <div class="sidebar__icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
        <div><div class="sidebar__name">SafePlace</div><div class="sidebar__sub">BIOMETRIC MONITOR</div></div>
      </div>

     <!-- Navegación -->
      <nav class="sidebar__nav">
        <a class="nav-item" href="Seguridad-Home.html"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg> Home </a>
        <a  class="nav-item" href="Seguridad-AlertasActivas.html"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg> Alertas Activas</a>
        <a class="nav-item nav-item--active" href="Seguridad-Historial.html"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Historial Alertas</a>
        <a class="nav-item" href="Seguridad-Notificaciones.html"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg> Notificaciones</a>
      </nav>

      <!-- Usuario logueado + cerrar sesión -->
      <div class="sidebar__footer">
        <div class="sidebar__user">
          <div class="avatar avatar--sm">CM</div>
            <div>
              <div class="sidebar__user-name">Carlos Mendoza</div>   <!--PONER EL NOMBRE DEL QUE ENTRO-->
              <div class="sidebar__user-role"> Resp. Seguridad e Higiene </div>     <!--PONER EL ROL DEL QUE ENTRO-->
            </div>
        </div>
        <a class="sidebar__logout" href='InicioSesion.html'><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"> <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Cerrar sesión </a>
      </div>

    </aside>

    <!-- BARRA SUPERIOR --> 
    <main class="main">
      <header class="topbar">
        <div class="topbar__title">Historial</div>
        <div class="topbar__right">
          <div class="notif-bell"> <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"> <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/> <path d="M13.73 21a2 2 0 0 1-3.46 0"/> </svg> <span class="notif-badge" id="notifBadge">4</span> </div>
          <div class="avatar">MG</div> <!--PONER EL avatar-->
        </div>
      </header>

    <!-- PANTALLA Hisotrial -->
    <!-- Encabezado -->
    <div class="hist-header">
      <div>
        <h2 class="welcome__title">Historial de Alertas</h2>
        <p class="hist-header__count" id="histCount">8 registros encontrados</p>
      </div>
      <div class="hist-export">
        <button class="btn-export" id="btnPDF">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          PDF
        </button>
        <button class="btn-export" id="btnExcel">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
          Excel
        </button>
      </div>
    </div>
 
    <!-- Filtros -->
    <div class="hist-filters">
      <div class="hist-filter-group">
        <label class="hist-filter-label">Empleado</label>
        <input type="text" class="hist-input" id="filterEmpleado" placeholder="Buscar empleado..."/>
      </div>
      <div class="hist-filter-group">
        <label class="hist-filter-label">Desde</label>
        <input type="date" class="hist-input" id="filterDesde" value="2026-07-21"/>
      </div>
      <div class="hist-filter-group">
        <label class="hist-filter-label">Tipo</label>
        <select class="hist-select" id="filterTipo">
          <option value="">Todos</option>
          <option value="Fatiga">Fatiga</option>
          <option value="Sobresesfuerzo">Sobresesfuerzo</option>
          <option value="Inactividad">Inactividad</option>
        </select>
      </div>
    </div>
 
    <!-- Gráficas -->
    <div class="hist-charts">
      <div class="card">
        <div class="card__header">
          <span>Distribución por Tipo</span>
        </div>
        <div class="card__body">
          <canvas id="chartTipo" height="200"></canvas>
        </div>
      </div>
 
      <div class="card">
        <div class="card__header">
          <span>Por Nivel de Severidad</span>
        </div>
        <div class="card__body">
          <canvas id="chartSeveridad" height="200"></canvas>
        </div>
      </div>
    </div>
 
    <!-- Tabla de historial -->
    <div class="hist-table-wrap">
      <table class="hist-table">
        <thead>
          <tr>
            <th>SEVERIDAD</th>
            <th>TIPO</th>
            <th>EMPLEADO</th>
            <th>FECHA</th>
            <th>ESTADO</th>
          </tr>
        </thead>
        <tbody id="histTableBody">
          <!-- Filas inyectadas por HistorialAlertas.js -->
        </tbody>
      </table>
    </div>
 
  </main>
</div>
  </main>
</div>

  <script src="session-ui.js"></script>
  <script src="Seguridad-Historial.js"></script>
</body>
</html>
