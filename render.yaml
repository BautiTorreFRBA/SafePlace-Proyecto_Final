services:
  - type: web
    name: safeplace-backend-api
    env: docker
    dockerfilePath: ./services/backend-api/Dockerfile
    dockerContext: .
    region: ohio
    plan: free
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false # Configurar en el dashboard de Render (Neon Serverless)
      - key: JWT_SECRET
        sync: false # Configurar en el dashboard
      - key: CORS_ORIGIN
        sync: false # URL de Vercel
      - key: GATEWAY_API_KEY
        sync: false # Secret para Gateway BLE
